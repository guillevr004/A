<!DOCTYPE html>
<html>
<head>
    <title>Redirect</title>
</head>
<body>

<script>
const path = window.location.pathname;

// 👉 ROOT → LOGIN
if (path === "/" || path === "/index.html") {
    window.location.href = "/src/pages/auth/index.html";
}

// 👉 RUTAS INVÁLIDAS → 404
else if (!path.includes("/src/pages/")) {
    window.location.href = "/src/pages/404/index.html";
}
</script>

</body>
</html>
