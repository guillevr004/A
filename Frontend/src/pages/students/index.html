<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Matrix</title>
    <link rel="stylesheet" href="../../shared/css/main.css"/>
    <link rel="stylesheet" href="./students.css">
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

    <h1>STUDENT DATABASE</h1>

    <div class="search-box">
        <input type="text" id="searchStudent" placeholder="Search by name or code">
    </div>

    <form id="studentForm">
        <input type="text" id="student_code" placeholder="Code" required>
        <input type="text" id="first_name" placeholder="First Name" required>
        <input type="text" id="last_name" placeholder="Last Name" required>
        <input type="text" id="document_type" placeholder="Doc Type">
        <input type="text" id="document_number" placeholder="Document">
        <input type="text" id="grade" placeholder="Grade">
        <input type="number" id="school_year" placeholder="Year">

        <button type="submit">SAVE STUDENT</button>
        <button type="button" id="cancelEdit" style="display:none;">CANCEL EDIT</button>
    </form>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Document</th>
                    <th>Grade</th>
                    <th>Year</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="studentsTable"></tbody>
        </table>
    </div>

</div>

<script>
/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

const letters = "アァカサタナハマヤャラワン0123456789";
const fontSize = 16;

let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00ff9f";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if (drops[i]*fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i]++;
    }
}

setInterval(draw, 33);

window.addEventListener("resize", () => {
    resizeCanvas();
    columns = Math.floor(canvas.width / fontSize);
    drops = Array(columns).fill(1);
});
</script>

<script type="module" src="./students.js"></script>
</body>
</html>
